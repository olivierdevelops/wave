name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test / go${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      # Timeout is generous because the e2e and supervisor tests
      # spawn real processes; under -race on a small CI runner they
      # need ~30s each. -count=1 disables the test cache so a transient
      # flake can't get baked into a green report.
      - name: Test (race)
        run: go test ./... -race -count=1 -timeout 300s -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  # Lint job runs but does not block merges — the existing codebase
  # has accumulated staticcheck/golangci-lint findings (mostly
  # unused-symbol noise from in-flight features). Tracked for cleanup
  # in https://github.com/luowensheng/wave/issues — until then we want
  # the report without gating PRs on it. `go vet` IS still a hard
  # gate via the `test` job above.
  lint:
    name: lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # Examples-boot is advisory for v0.1 — some demos require external
  # services (Postgres, OAuth provider creds, plugin binaries) that
  # aren't available in CI, and the smoke script's exclusion list
  # isn't comprehensive yet. We still run it for signal.
  examples-boot:
    name: examples / boot smoke (advisory)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Build wave binary
        run: go build -o /tmp/wave ./orchestrator
      - name: Boot each example and probe /healthz
        env:
          WAVE_BIN: /tmp/wave
        run: bash .github/scripts/smoke-examples.sh

  build-matrix:
    name: cross-build / ${{ matrix.target.goos }}-${{ matrix.target.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Cross build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0' # cross builds skip CGO; sqlite-backed builds use the matrix in commands.yaml
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.target.goos }}" = "windows" ]; then ext=".exe"; fi
          VERSION="${GITHUB_REF_NAME:-dev}"
          COMMIT="$(git rev-parse --short HEAD)"
          go build -trimpath -tags=nosqlite \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o dist/wave-${{ matrix.target.goos }}-${{ matrix.target.goarch }}${ext} \
            ./orchestrator
      - uses: actions/upload-artifact@v4
        with:
          name: wave-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*
