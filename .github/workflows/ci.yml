name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test / ${{ matrix.os }} / go${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.24.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test ./... -race -timeout 180s -coverprofile=coverage.out -covermode=atomic
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: lint (staticcheck + golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  examples-boot:
    name: examples / boot smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Build wave binary
        run: go build -o /tmp/wave ./orchestrator
      - name: Boot each example and probe /healthz
        env:
          WAVE_BIN: /tmp/wave
        run: bash .github/scripts/smoke-examples.sh

  build-matrix:
    name: cross-build / ${{ matrix.target.goos }}-${{ matrix.target.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - name: Cross build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: '0' # cross builds skip CGO; sqlite-backed builds use the matrix in commands.yaml
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.target.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -tags=nosqlite -o dist/wave-${{ matrix.target.goos }}-${{ matrix.target.goarch }}${ext} ./orchestrator
      - uses: actions/upload-artifact@v4
        with:
          name: wave-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/*
