name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow only one concurrent deployment, skipping queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Stage install.sh into public/
        # Keep install.sh at the repo root as the canonical source.
        # VitePress serves files under public/ verbatim at the site
        # root, so this makes the script reachable at
        # https://luowensheng.github.io/wave/install.sh
        run: |
          mkdir -p docs-site/public
          cp install.sh docs-site/public/install.sh
          chmod +x docs-site/public/install.sh
      - name: Install
        working-directory: docs-site
        # Use `npm ci` (reproducible, lockfile-driven) instead of
        # `npm install` (which mutates the lockfile).
        run: npm ci
      - name: Build
        working-directory: docs-site
        run: npm run docs:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
