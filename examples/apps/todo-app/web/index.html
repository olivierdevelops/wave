<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>todo-app</title>
  <style>
    body { font: 16px/1.45 system-ui, sans-serif; max-width: 560px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { margin-bottom: 0.2rem; }
    .meta { color: #888; font-size: 0.9em; margin-bottom: 1.2rem; }
    form { display: flex; gap: .5rem; margin: 1rem 0; }
    input[type=text], input[type=email] { flex: 1; padding: .45rem .6rem; font: inherit; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: .45rem .9rem; font: inherit; border: 1px solid #444; background: #f8f8f8; border-radius: 4px; cursor: pointer; }
    ul { list-style: none; padding: 0; }
    li { display: flex; align-items: center; gap: .6rem; padding: .55rem 0; border-bottom: 1px solid #eee; }
    li.done span.t { text-decoration: line-through; color: #999; }
    .x { background: none; border: 0; color: #c44; cursor: pointer; font-size: 1.1em; }
    .out { font-size: .85em; color: #666; margin-top: .8rem; }
  </style>
</head>
<body>
  <h1>todo</h1>
  <div class="meta" id="meta"></div>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');
    const meta = document.getElementById('meta');

    async function init() {
      const r = await fetch('/me');
      if (r.status === 200) {
        const me = await r.json();
        const email = me[0]?.email || me.email || 'unknown';
        meta.innerHTML = 'signed in as <strong></strong> · <a href="#" id="lo">log out</a>';
        meta.querySelector('strong').textContent = email;
        document.getElementById('lo').onclick = async (e) => {
          e.preventDefault();
          await fetch('/auth/logout', { method: 'POST' });
          location.reload();
        };
        renderTodos();
      } else {
        renderLogin();
      }
    }

    function renderLogin() {
      meta.textContent = 'Magic-link sign-in (no password)';
      app.innerHTML =
        '<form id="lf"><input type="email" name="email" placeholder="you@example.com" required>' +
        '<button>send link</button></form><div class="out" id="out"></div>';
      document.getElementById('lf').onsubmit = async (e) => {
        e.preventDefault();
        const email = e.target.email.value.trim();
        await fetch('/auth/login/request', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        document.getElementById('out').textContent =
          'Link sent. In dev mode, check the server stderr for the URL and open it.';
      };
    }

    async function renderTodos() {
      app.innerHTML =
        '<form id="nf"><input type="text" name="title" placeholder="What needs doing?" required>' +
        '<button>add</button></form><ul id="list"></ul>';
      document.getElementById('nf').onsubmit = async (e) => {
        e.preventDefault();
        const title = e.target.title.value.trim();
        if (!title) return;
        await fetch('/todos', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ title }),
        });
        e.target.reset();
        loadList();
      };
      loadList();
    }

    async function loadList() {
      const r = await fetch('/todos');
      const rows = (await r.json()) || [];
      const list = document.getElementById('list');
      list.innerHTML = '';
      for (const t of rows) {
        const li = document.createElement('li');
        if (t.done) li.classList.add('done');
        li.innerHTML =
          '<input type="checkbox" class="c"><span class="t"></span>' +
          '<button class="x" title="delete">×</button>';
        li.querySelector('.t').textContent = t.title;
        const cb = li.querySelector('.c');
        cb.checked = !!t.done;
        cb.onchange = async () => {
          await fetch('/todos/' + t.id + '/toggle', { method: 'POST' });
          loadList();
        };
        li.querySelector('.x').onclick = async () => {
          await fetch('/todos/' + t.id, { method: 'DELETE' });
          loadList();
        };
        list.appendChild(li);
      }
    }

    init();
  </script>
</body>
</html>
