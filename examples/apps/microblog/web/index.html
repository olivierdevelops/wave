<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>microblog</title>
  <style>
    body { font: 15px/1.45 system-ui, sans-serif; max-width: 560px; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { margin: 0; }
    .meta { color: #888; font-size: .9em; margin-bottom: 1rem; }
    form { margin: 1rem 0; }
    textarea { width: 100%; box-sizing: border-box; min-height: 70px; font: inherit; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: .4rem; }
    button { background: #1da1f2; color: #fff; border: 0; padding: .45rem 1rem; border-radius: 999px; cursor: pointer; font: inherit; }
    .post { padding: .7rem 0; border-bottom: 1px solid #eee; }
    .post .who { font-weight: 600; }
    .post .who a { color: inherit; text-decoration: none; }
    .post .when { color: #888; font-size: .8em; }
    .post .body { margin-top: .25rem; white-space: pre-wrap; word-wrap: break-word; }
    .ct { color: #888; font-size: .85em; }
    a { color: #1da1f2; }
  </style>
</head>
<body>
  <h1>microblog</h1>
  <div class="meta" id="meta"></div>
  <div id="composer"></div>
  <div id="feed"></div>

  <script>
    const meta = document.getElementById('meta');
    const composer = document.getElementById('composer');
    const feed = document.getElementById('feed');
    let me = null;

    async function init() {
      const params = new URLSearchParams(location.search);
      const userView = params.get('u');
      const r = await fetch('/me');
      if (r.status === 200) {
        const j = await r.json();
        me = (Array.isArray(j) ? j[0] : j).handle;
      }
      renderHeader(userView);
      renderComposer();
      loadFeed(userView);
      const sse = new EventSource('/events/timeline');
      sse.addEventListener('post', () => loadFeed(userView));
    }

    function renderHeader(userView) {
      let html = '';
      if (userView) html += '<a href="/app">← back to timeline</a> · ';
      if (me) {
        html += 'signed in as <strong></strong> · <a href="#" id="lo">log out</a>';
      } else {
        html += '<a href="#" id="li">sign in</a>';
      }
      meta.innerHTML = html;
      if (me) meta.querySelector('strong').textContent = me;
      const lo = document.getElementById('lo');
      if (lo) lo.onclick = async (e) => { e.preventDefault();
        await fetch('/auth/logout', { method: 'POST' }); location.reload(); };
      const li = document.getElementById('li');
      if (li) li.onclick = (e) => { e.preventDefault(); showLogin(); };
    }

    function showLogin() {
      composer.innerHTML =
        '<form id="lf"><input type=email name=email required placeholder="you@example.com">' +
        '<button>send link</button></form><div class=ct id=lo></div>';
      document.getElementById('lf').onsubmit = async (e) => {
        e.preventDefault();
        await fetch('/auth/login/request', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email: e.target.email.value }),
        });
        document.getElementById('lo').textContent =
          'Sent. Check the server stderr for the magic link.';
      };
    }

    function renderComposer() {
      if (!me) return;
      composer.innerHTML =
        '<form id="pf"><textarea name=body maxlength=280 required ' +
        'placeholder="What is happening?"></textarea>' +
        '<div class="row"><span class="ct" id="ct">280</span><button>quack</button></div></form>';
      const ta = document.querySelector('#pf textarea');
      const ct = document.getElementById('ct');
      ta.oninput = () => { ct.textContent = 280 - ta.value.length; };
      document.getElementById('pf').onsubmit = async (e) => {
        e.preventDefault();
        const body = ta.value.trim();
        if (!body) return;
        await fetch('/posts', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ body }),
        });
        await fetch('/posts/notify', { method: 'POST' });
        e.target.reset();
        ct.textContent = 280;
      };
    }

    async function loadFeed(handle) {
      const url = handle ? '/u/' + encodeURIComponent(handle) : '/timeline';
      const r = await fetch(url);
      const rows = (await r.json()) || [];
      feed.innerHTML = '';
      for (const p of rows) {
        const el = document.createElement('div');
        el.className = 'post';
        el.innerHTML = '<div class="who"><a></a> · <span class="when"></span></div>' +
                       '<div class="body"></div>';
        const a = el.querySelector('a');
        a.textContent = '@' + p.handle;
        a.href = '/app?u=' + encodeURIComponent(p.handle);
        el.querySelector('.when').textContent = p.created_at;
        el.querySelector('.body').textContent = p.body;
        feed.appendChild(el);
      }
    }

    init();
  </script>
</body>
</html>
