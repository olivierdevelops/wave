<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>analytics demo</title>
  <style>
    body { font: 15px/1.45 system-ui, sans-serif; max-width: 600px; margin: 1.5rem auto; padding: 0 1rem; color: #222; }
    h1 { margin: 0 0 .2rem; }
    .meta { color: #888; font-size: .9em; margin-bottom: 1rem; }
    button { font: inherit; padding: .5rem 1rem; border-radius: 4px; border: 0; background: #1976d2; color: #fff; cursor: pointer; margin-right: .4rem; }
    pre { background: #f6f6f6; padding: .7rem; border-radius: 4px; overflow: auto; }
  </style>
</head>
<body>
  <h1>analytics — demo client</h1>
  <div class="meta">Click the buttons to POST page-view events. Then visit
    <code>/dashboard</code> (basic-auth: admin / admin) to see counts.</div>

  <p>
    <button data-p="/home">view /home</button>
    <button data-p="/pricing">view /pricing</button>
    <button data-p="/blog/launch">view /blog/launch</button>
    <button data-p="/contact">view /contact</button>
  </p>

  <pre id="log">click a button…</pre>

  <script>
    // Hash the user agent so we can count uniques without storing it.
    async function uaHash() {
      const buf = await crypto.subtle.digest(
        'SHA-256', new TextEncoder().encode(navigator.userAgent));
      return [...new Uint8Array(buf)].slice(0, 8)
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const log = document.getElementById('log');
    document.querySelectorAll('button[data-p]').forEach(b => {
      b.onclick = async () => {
        const ua = await uaHash();
        const payload = {
          site_id: 'demo',
          path: b.dataset.p,
          referrer: document.referrer || '',
          ua_hash: ua,
        };
        const r = await fetch('/collect', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        log.textContent = 'POST /collect → ' + r.status + '\n' +
          JSON.stringify(payload, null, 2);
      };
    });
  </script>
</body>
</html>
