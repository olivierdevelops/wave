# multi-tenant-saas — subdomain-derived tenant scoping.
#
# The Host header (e.g. `acme.localhost:8602`) is parsed via inputs to
# expose `{{tenant}}` to storage queries. Every row carries a tenant_id,
# so cross-tenant reads can't leak.
#
# Run:
#   wave serve examples/apps/multi-tenant-saas/server.yaml --port 8602
# Test (acme tenant):
#   curl --resolve acme.localhost:8602:127.0.0.1 \
#        http://acme.localhost:8602/projects
#   curl --resolve acme.localhost:8602:127.0.0.1 -X POST \
#        http://acme.localhost:8602/projects \
#        -H 'Content-Type: application/json' \
#        -d '{"name":"alpha"}'

default:
  host: 127.0.0.1
  port: 8602

storage:
  app:
    type: sqlite
    path: ./data.db
    tables:
      projects:
        columns:
          - id INTEGER PRIMARY KEY AUTOINCREMENT
          - tenant_id TEXT NOT NULL
          - name TEXT NOT NULL
          - created_at TEXT NOT NULL DEFAULT (datetime('now'))

routes:
  - path: /projects
    method: GET
    type: storage-access
    inputs:
      - { name: tenant, source: header, from: Host, type: string, required: true,
          pattern: "^[a-z0-9-]+\\.localhost(:[0-9]+)?$" }
    storage-access:
      source: app
      execute: "SELECT id, name, created_at FROM projects WHERE tenant_id = substr({{tenant}}, 1, instr({{tenant}}, '.localhost')-1) ORDER BY id DESC"
      response_content_type: application/json
      output_template: "{{toJSON .Data}}"

  - path: /projects
    method: POST
    type: storage-access
    inputs:
      - { name: tenant, source: header, from: Host, type: string, required: true,
          pattern: "^[a-z0-9-]+\\.localhost(:[0-9]+)?$" }
      - { name: name, source: body, type: string, required: true, min: 1, max: 80 }
    storage-access:
      source: app
      execute: "INSERT INTO projects(tenant_id, name) VALUES (substr({{tenant}}, 1, instr({{tenant}}, '.localhost')-1), {{name}})"
      response_content_type: application/json
      output_template: '{"id": {{.LastInsertID}}}'
