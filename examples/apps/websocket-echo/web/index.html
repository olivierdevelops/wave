<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wave WS Echo</title>
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ddd; height: 320px; overflow-y: auto; padding: .5rem; background: #111; color: #0f0; font-family: monospace; }
    .l { padding: .15rem 0; }
    form { display: flex; gap: .5rem; margin-top: .5rem; }
    input { flex: 1; padding: .5rem; }
    button { padding: .5rem 1rem; }
    .status { color: #888; font-size: 12px; margin-top: .25rem; }
  </style>
</head>
<body>
  <h2>Wave WebSocket Echo</h2>
  <div id="log"></div>
  <div class="status" id="s">connecting…</div>
  <form id="f">
    <input id="t" autocomplete="off" placeholder="Type JSON or text…" autofocus>
    <button>Send</button>
  </form>
  <script>
    const log = document.getElementById('log');
    const s = document.getElementById('s');
    const append = t => { const d = document.createElement('div'); d.className='l'; d.textContent=t; log.appendChild(d); log.scrollTop = log.scrollHeight; };
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(proto + '://' + location.host + '/ws/echo');
    ws.onopen = () => s.textContent = 'connected';
    ws.onclose = () => s.textContent = 'disconnected';
    ws.onmessage = e => append('< ' + e.data);
    document.getElementById('f').onsubmit = async e => {
      e.preventDefault();
      const t = document.getElementById('t');
      if (!t.value) return;
      let body = t.value;
      try { JSON.parse(body); } catch { body = JSON.stringify({ text: body }); }
      append('> ' + body);
      await fetch('/echo', { method: 'POST', headers: {'Content-Type':'application/json'}, body });
      t.value = '';
    };
  </script>
</body>
</html>
