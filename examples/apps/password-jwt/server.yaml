# Classic username/password sign-in. The login route validates
# credentials against `default_logins`, then mints a JWT and drops
# it in an HttpOnly cookie. Protected routes verify the JWT.

default:
  host: localhost
  port: 8002

auth:
  session:
    type: jwt
    token_location: cookie
    cookie_name: wave_session
    secret: dev-secret-change-me
    token_duration_seconds: 86400
    redirect_on_failure: /login
    redirect_on_success: /me
    default_logins:
      - { username: admin, password: admin }
      - { username: user,  password: user  }

routes:
  - path: /login
    method: GET
    type: content
    content:
      content_type: text/html
      body: |
        <!doctype html>
        <title>password-jwt demo</title>
        <h1>Sign in</h1>
        <form method=POST action=/auth/login>
          <input name=username placeholder=username value=admin>
          <input name=password type=password placeholder=password value=admin>
          <button>sign in</button>
        </form>
        <p>Try <code>admin/admin</code> or <code>user/user</code>.</p>

  - path: /auth/login
    method: POST
    type: auth-login
    auth-login:
      for: session
      redirect_on_success: /me
      redirect_on_failure: /login

  - path: /auth/logout
    method: POST
    type: auth-logout
    auth-logout:
      for: session
      redirect_on_success: /login

  - path: /me
    method: GET
    type: content
    auth: ["session"]
    content:
      content_type: text/html
      body: |
        <h1>Signed in</h1>
        <p>You hold a valid JWT cookie. <form method=POST action=/auth/logout style=display:inline>
        <button>log out</button></form></p>
