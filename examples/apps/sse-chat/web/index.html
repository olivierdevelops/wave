<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wave SSE Chat</title>
  <style>
    body { font: 14px/1.4 system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ddd; height: 360px; overflow-y: auto; padding: .5rem; background: #fafafa; }
    .msg { padding: .25rem 0; border-bottom: 1px dotted #eee; }
    .meta { color: #888; font-size: 11px; }
    form { display: flex; gap: .5rem; margin-top: .5rem; }
    input { flex: 1; padding: .5rem; }
    button { padding: .5rem 1rem; }
  </style>
</head>
<body>
  <h2>Wave SSE Chat</h2>
  <div id="log"></div>
  <form id="f">
    <input id="t" autocomplete="off" placeholder="Say something…" autofocus>
    <button>Send</button>
  </form>
  <script>
    const log = document.getElementById('log');
    const append = (text, meta) => {
      const d = document.createElement('div');
      d.className = 'msg';
      d.innerHTML = '<div>' + text.replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])) + '</div>' +
                    '<div class="meta">' + (meta || '') + '</div>';
      log.appendChild(d);
      log.scrollTop = log.scrollHeight;
    };
    const es = new EventSource('/events/chat');
    es.addEventListener('message', e => {
      try { const d = JSON.parse(e.data); append(d.text || JSON.stringify(d), new Date().toLocaleTimeString()); }
      catch { append(e.data, ''); }
    });
    es.onerror = () => append('[disconnected]', '');
    document.getElementById('f').onsubmit = async e => {
      e.preventDefault();
      const t = document.getElementById('t');
      if (!t.value) return;
      await fetch('/messages', { method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ text: t.value }) });
      t.value = '';
    };
  </script>
</body>
</html>
